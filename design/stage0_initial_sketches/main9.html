<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MVP v3</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: sans-serif;
      }

      #toolbar {
        position: fixed;
        left: 8px;
        top: 8px;
        z-index: 20;
        display: flex;
        gap: 6px;
        align-items: center;
      }

      #toolbar button {
        height: 28px;
        min-width: 28px;
        padding: 0 8px;
      }

      #modeLabel {
        position: fixed;
        left: 8px;
        top: 44px;
        z-index: 20;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid #bbb;
        border-radius: 4px;
        padding: 4px 6px;
        font-size: 12px;
      }

      #rectPanel {
        position: fixed;
        left: 8px;
        top: 72px;
        z-index: 20;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid #bbb;
        border-radius: 4px;
        padding: 6px;
        display: none;
        min-width: 148px;
      }

      #rectPanel label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        margin-bottom: 6px;
      }

      .wallRow {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-bottom: 4px;
        font-size: 12px;
      }

      .wallRow span {
        min-width: 40px;
      }

      .wallRow button {
        width: 24px;
        height: 24px;
        padding: 0;
      }

      .wallRow.disabled {
        opacity: 0.45;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button id="addRect" title="Draw rectangle">+</button>
      <button id="lockMode" title="Lock rectangles">&#128274;</button>
      <button id="measureMode" title="Set scale">&#128207;</button>
      <button id="doneLock" title="Finish lock">Done lock</button>
      <button id="cancelLock" title="Cancel lock">Cancel</button>
      <input id="scaleMeters" title="Line length in meters" type="number" step="0.01" min="0" placeholder="meters" />
      <button id="setScale" title="Set scale">Set scale</button>
      <button id="cancelScale" title="Cancel scale">Cancel</button>
    </div>
    <div id="modeLabel"></div>
    <div id="rectPanel">
      <label><input id="isWallToggle" type="checkbox" />is wall</label>
      <div class="wallRow" id="wallRowTop">
        <span>Top</span>
        <button id="wallTopDec" type="button">&lt;</button>
        <span id="wallTopValue">0 cm</span>
        <button id="wallTopInc" type="button">&gt;</button>
      </div>
      <div class="wallRow" id="wallRowRight">
        <span>Right</span>
        <button id="wallRightDec" type="button">&lt;</button>
        <span id="wallRightValue">0 cm</span>
        <button id="wallRightInc" type="button">&gt;</button>
      </div>
      <div class="wallRow" id="wallRowBottom">
        <span>Bottom</span>
        <button id="wallBottomDec" type="button">&lt;</button>
        <span id="wallBottomValue">0 cm</span>
        <button id="wallBottomInc" type="button">&gt;</button>
      </div>
      <div class="wallRow" id="wallRowLeft">
        <span>Left</span>
        <button id="wallLeftDec" type="button">&lt;</button>
        <span id="wallLeftValue">0 cm</span>
        <button id="wallLeftInc" type="button">&gt;</button>
      </div>
    </div>
    <canvas id="c"></canvas>

    <script>
      const DEFAULT_WORLD_UNITS_PER_METER = 10;
      const CM_PER_METER = 100;
      const SNAP_DISTANCE = 12;
      const SNAP_OVERLAP_TOLERANCE = 10;
      const MIN_RECT_SIZE = 16;
      const HANDLE_SIZE_PX = 16;
      const MIN_SCALE_LINE_LENGTH = 2;

      const ui = {
        tool: "select" // "select" | "drawRect" | "lockSelect" | "measureScale"
      };

      function createRect(id, x, y, w, h) {
        return {
          id,
          x,
          y,
          w,
          h,
          groupId: null,
          isWall: false,
          wallCm: { top: 0, right: 0, bottom: 0, left: 0 }
        };
      }

      const objects = [
        createRect(1, 100, 100, 160, 100),
        createRect(2, 400, 200, 120, 160)
      ];
      let nextId = 3;
      let nextGroupId = 1;
      const lockDraftSet = new Set();
      let selectedId = null;
      let lastCreatedId = null;
      let metersPerWorldUnit = 1 / DEFAULT_WORLD_UNITS_PER_METER;
      let scaleReferenceMeters = null;
      let scaleReferenceLine = null;
      const measureDraft = {
        active: false,
        x0: 0,
        y0: 0,
        x1: 0,
        y1: 0
      };
      const scaleInputState = {
        pendingLength: 0
      };

      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const addRectBtn = document.getElementById("addRect");
      const lockModeBtn = document.getElementById("lockMode");
      const measureModeBtn = document.getElementById("measureMode");
      const doneLockBtn = document.getElementById("doneLock");
      const cancelLockBtn = document.getElementById("cancelLock");
      const scaleMetersInput = document.getElementById("scaleMeters");
      const setScaleBtn = document.getElementById("setScale");
      const cancelScaleBtn = document.getElementById("cancelScale");
      const modeLabel = document.getElementById("modeLabel");
      const rectPanel = document.getElementById("rectPanel");
      const isWallToggle = document.getElementById("isWallToggle");

      const wallControls = {
        top: {
          row: document.getElementById("wallRowTop"),
          dec: document.getElementById("wallTopDec"),
          value: document.getElementById("wallTopValue"),
          inc: document.getElementById("wallTopInc")
        },
        right: {
          row: document.getElementById("wallRowRight"),
          dec: document.getElementById("wallRightDec"),
          value: document.getElementById("wallRightValue"),
          inc: document.getElementById("wallRightInc")
        },
        bottom: {
          row: document.getElementById("wallRowBottom"),
          dec: document.getElementById("wallBottomDec"),
          value: document.getElementById("wallBottomValue"),
          inc: document.getElementById("wallBottomInc")
        },
        left: {
          row: document.getElementById("wallRowLeft"),
          dec: document.getElementById("wallLeftDec"),
          value: document.getElementById("wallLeftValue"),
          inc: document.getElementById("wallLeftInc")
        }
      };

      function resize() {
        const dpr = window.devicePixelRatio || 1;
        const cssW = window.innerWidth;
        const cssH = window.innerHeight;

        canvas.style.width = cssW + "px";
        canvas.style.height = cssH + "px";
        canvas.width = Math.floor(cssW * dpr);
        canvas.height = Math.floor(cssH * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      window.addEventListener("resize", resize);
      resize();

      const camera = { x: 0, y: 0, zoom: 1 };
      const background = {
        loaded: false,
        image: new Image(),
        x: 0,
        y: 0,
        w: 0,
        h: 0
      };

      function centerBackgroundInView() {
        const centerX = camera.x + window.innerWidth / (2 * camera.zoom);
        const centerY = camera.y + window.innerHeight / (2 * camera.zoom);
        background.x = centerX - background.w / 2;
        background.y = centerY - background.h / 2;
      }

      background.image.addEventListener("load", () => {
        background.loaded = true;
        background.w = background.image.naturalWidth;
        background.h = background.image.naturalHeight;
        centerBackgroundInView();
      });
      background.image.src = "apartment1.png";

      function screenToWorld(sx, sy) {
        return {
          x: camera.x + sx / camera.zoom,
          y: camera.y + sy / camera.zoom
        };
      }

      function worldToScreen(wx, wy) {
        return {
          x: (wx - camera.x) * camera.zoom,
          y: (wy - camera.y) * camera.zoom
        };
      }

      function cmToWorld(cm) {
        return (cm / CM_PER_METER) / metersPerWorldUnit;
      }

      function worldToCm(worldUnits) {
        return worldUnits * metersPerWorldUnit * CM_PER_METER;
      }

      function getWallWorld(rect) {
        if (rect.isWall) {
          return { top: 0, right: 0, bottom: 0, left: 0 };
        }
        return {
          top: cmToWorld(rect.wallCm.top),
          right: cmToWorld(rect.wallCm.right),
          bottom: cmToWorld(rect.wallCm.bottom),
          left: cmToWorld(rect.wallCm.left)
        };
      }

      function getOuterRect(rect) {
        const wall = getWallWorld(rect);
        return {
          x: rect.x - wall.left,
          y: rect.y - wall.top,
          w: rect.w + wall.left + wall.right,
          h: rect.h + wall.top + wall.bottom
        };
      }

      function hitTest(worldPt) {
        for (let index = objects.length - 1; index >= 0; index--) {
          const object = objects[index];
          const outer = getOuterRect(object);
          if (
            worldPt.x >= outer.x &&
            worldPt.x <= outer.x + outer.w &&
            worldPt.y >= outer.y &&
            worldPt.y <= outer.y + outer.h
          ) {
            return object;
          }
        }
        return null;
      }

      function getById(id) {
        return objects.find((object) => object.id === id) || null;
      }

      function getResizeHandles(rect) {
        const target = getOuterRect(rect);
        const size = HANDLE_SIZE_PX / camera.zoom;
        const half = size / 2;
        const xMid = target.x + target.w / 2;
        const yMid = target.y + target.h / 2;
        const xMin = target.x;
        const xMax = target.x + target.w;
        const yMin = target.y;
        const yMax = target.y + target.h;

        return [
          { name: "nw", x: xMin - half, y: yMin - half, w: size, h: size },
          { name: "n", x: xMid - half, y: yMin - half, w: size, h: size },
          { name: "ne", x: xMax - half, y: yMin - half, w: size, h: size },
          { name: "e", x: xMax - half, y: yMid - half, w: size, h: size },
          { name: "se", x: xMax - half, y: yMax - half, w: size, h: size },
          { name: "s", x: xMid - half, y: yMax - half, w: size, h: size },
          { name: "sw", x: xMin - half, y: yMax - half, w: size, h: size },
          { name: "w", x: xMin - half, y: yMid - half, w: size, h: size }
        ];
      }

      function hitResizeHandle(worldPt, rect) {
        const handles = getResizeHandles(rect);
        for (let index = handles.length - 1; index >= 0; index--) {
          const handle = handles[index];
          if (
            worldPt.x >= handle.x &&
            worldPt.x <= handle.x + handle.w &&
            worldPt.y >= handle.y &&
            worldPt.y <= handle.y + handle.h
          ) {
            return handle.name;
          }
        }
        return null;
      }

      function getDragMembers(target) {
        if (target.groupId == null) {
          return [target];
        }
        return objects.filter((object) => object.groupId === target.groupId);
      }

      function bringIdsToFront(ids) {
        const idSet = new Set(ids);
        const keep = objects.filter((object) => !idSet.has(object.id));
        const move = objects.filter((object) => idSet.has(object.id));
        objects.splice(0, objects.length, ...keep, ...move);
      }

      function overlap1d(a0, a1, b0, b1, tolerance = 0) {
        return Math.min(a1, b1) - Math.max(a0, b0) >= -tolerance;
      }

      function computeSnapCandidate(movingObject, movingIds) {
        const movingRect = getOuterRect(movingObject);
        let bestX = null;
        let bestY = null;

        for (const staticObject of objects) {
          if (movingIds.has(staticObject.id)) continue;
          const staticRect = getOuterRect(staticObject);

          if (
            overlap1d(
              movingRect.y,
              movingRect.y + movingRect.h,
              staticRect.y,
              staticRect.y + staticRect.h,
              SNAP_OVERLAP_TOLERANCE
            )
          ) {
            const leftToRight = staticRect.x + staticRect.w - movingRect.x;
            const rightToLeft = staticRect.x - (movingRect.x + movingRect.w);

            if (Math.abs(leftToRight) <= SNAP_DISTANCE && (!bestX || Math.abs(leftToRight) < Math.abs(bestX.delta))) {
              bestX = {
                delta: leftToRight,
                line: staticRect.x + staticRect.w
              };
            }

            if (Math.abs(rightToLeft) <= SNAP_DISTANCE && (!bestX || Math.abs(rightToLeft) < Math.abs(bestX.delta))) {
              bestX = {
                delta: rightToLeft,
                line: staticRect.x
              };
            }
          }

          if (
            overlap1d(
              movingRect.x,
              movingRect.x + movingRect.w,
              staticRect.x,
              staticRect.x + staticRect.w,
              SNAP_OVERLAP_TOLERANCE
            )
          ) {
            const topToBottom = staticRect.y + staticRect.h - movingRect.y;
            const bottomToTop = staticRect.y - (movingRect.y + movingRect.h);

            if (Math.abs(topToBottom) <= SNAP_DISTANCE && (!bestY || Math.abs(topToBottom) < Math.abs(bestY.delta))) {
              bestY = {
                delta: topToBottom,
                line: staticRect.y + staticRect.h
              };
            }

            if (Math.abs(bottomToTop) <= SNAP_DISTANCE && (!bestY || Math.abs(bottomToTop) < Math.abs(bestY.delta))) {
              bestY = {
                delta: bottomToTop,
                line: staticRect.y
              };
            }
          }
        }

        if (!bestX && !bestY) {
          return null;
        }

        return {
          shiftX: bestX ? bestX.delta : 0,
          shiftY: bestY ? bestY.delta : 0,
          lineX: bestX ? bestX.line : null,
          lineY: bestY ? bestY.line : null
        };
      }

      function computeResizeSnapCandidate(resizedObject, handle) {
        const movingRect = getOuterRect(resizedObject);
        let bestX = null;
        let bestY = null;

        for (const staticObject of objects) {
          if (staticObject.id === resizedObject.id) continue;
          const staticRect = getOuterRect(staticObject);

          const canSnapX = handle.includes("e") || handle.includes("w");
          const canSnapY = handle.includes("n") || handle.includes("s");

          if (
            canSnapX &&
            overlap1d(
              movingRect.y,
              movingRect.y + movingRect.h,
              staticRect.y,
              staticRect.y + staticRect.h,
              SNAP_OVERLAP_TOLERANCE
            )
          ) {
            const movingEdgeX = handle.includes("e")
              ? movingRect.x + movingRect.w
              : movingRect.x;
            const candidateLines = [staticRect.x, staticRect.x + staticRect.w];

            for (const line of candidateLines) {
              const delta = line - movingEdgeX;
              if (Math.abs(delta) <= SNAP_DISTANCE && (!bestX || Math.abs(delta) < Math.abs(bestX.delta))) {
                bestX = { delta, line };
              }
            }
          }

          if (
            canSnapY &&
            overlap1d(
              movingRect.x,
              movingRect.x + movingRect.w,
              staticRect.x,
              staticRect.x + staticRect.w,
              SNAP_OVERLAP_TOLERANCE
            )
          ) {
            const movingEdgeY = handle.includes("s")
              ? movingRect.y + movingRect.h
              : movingRect.y;
            const candidateLines = [staticRect.y, staticRect.y + staticRect.h];

            for (const line of candidateLines) {
              const delta = line - movingEdgeY;
              if (Math.abs(delta) <= SNAP_DISTANCE && (!bestY || Math.abs(delta) < Math.abs(bestY.delta))) {
                bestY = { delta, line };
              }
            }
          }
        }

        if (!bestX && !bestY) {
          return null;
        }

        return {
          shiftX: bestX ? bestX.delta : 0,
          shiftY: bestY ? bestY.delta : 0,
          lineX: bestX ? bestX.line : null,
          lineY: bestY ? bestY.line : null
        };
      }

      const pointer = {
        down: false,
        sx: 0,
        sy: 0,
        mode: "idle", // "idle" | "drag" | "pan" | "drawRect" | "resize" | "measureScaleDraw"
        target: null,
        dragOffsetX: 0,
        dragOffsetY: 0,
        movingIds: new Set(),
        startPositions: new Map(),
        anchorStartX: 0,
        anchorStartY: 0,
        resizeHandle: null,
        resizeStartWorldX: 0,
        resizeStartWorldY: 0,
        resizeStartRect: null,
        snap: null
      };

      const draft = {
        active: false,
        x0: 0,
        y0: 0,
        x1: 0,
        y1: 0
      };

      function resetPointer() {
        pointer.down = false;
        pointer.mode = "idle";
        pointer.target = null;
        pointer.movingIds = new Set();
        pointer.startPositions = new Map();
        pointer.resizeHandle = null;
        pointer.resizeStartRect = null;
        pointer.snap = null;
      }

      function applyDragAt(worldPt) {
        const anchorRawX = worldPt.x - pointer.dragOffsetX;
        const anchorRawY = worldPt.y - pointer.dragOffsetY;
        const dx = anchorRawX - pointer.anchorStartX;
        const dy = anchorRawY - pointer.anchorStartY;

        for (const id of pointer.movingIds) {
          const object = getById(id);
          const start = pointer.startPositions.get(id);
          if (!object || !start) continue;
          object.x = start.x + dx;
          object.y = start.y + dy;
        }

        const candidate = computeSnapCandidate(pointer.target, pointer.movingIds);
        pointer.snap = candidate;

        if (candidate) {
          for (const id of pointer.movingIds) {
            const object = getById(id);
            if (!object) continue;
            object.x += candidate.shiftX;
            object.y += candidate.shiftY;
          }
        }
      }

      function applyResizeAt(worldPt) {
        const object = pointer.target;
        const start = pointer.resizeStartRect;
        const handle = pointer.resizeHandle;
        if (!object || !start || !handle) return;

        const dx = worldPt.x - pointer.resizeStartWorldX;
        const dy = worldPt.y - pointer.resizeStartWorldY;
        const right = start.x + start.w;
        const bottom = start.y + start.h;

        let x = start.x;
        let y = start.y;
        let w = start.w;
        let h = start.h;

        if (handle.includes("e")) {
          w = Math.max(MIN_RECT_SIZE, start.w + dx);
        }
        if (handle.includes("s")) {
          h = Math.max(MIN_RECT_SIZE, start.h + dy);
        }
        if (handle.includes("w")) {
          x = Math.min(start.x + dx, right - MIN_RECT_SIZE);
          w = right - x;
        }
        if (handle.includes("n")) {
          y = Math.min(start.y + dy, bottom - MIN_RECT_SIZE);
          h = bottom - y;
        }

        object.x = x;
        object.y = y;
        object.w = w;
        object.h = h;

        const candidate = computeResizeSnapCandidate(object, handle);
        pointer.snap = candidate;
        if (!candidate) return;

        if (candidate.shiftX !== 0) {
          if (handle.includes("e")) {
            object.w = Math.max(MIN_RECT_SIZE, object.w + candidate.shiftX);
          } else if (handle.includes("w")) {
            const rightEdge = object.x + object.w;
            object.x = Math.min(object.x + candidate.shiftX, rightEdge - MIN_RECT_SIZE);
            object.w = rightEdge - object.x;
          }
        }

        if (candidate.shiftY !== 0) {
          if (handle.includes("s")) {
            object.h = Math.max(MIN_RECT_SIZE, object.h + candidate.shiftY);
          } else if (handle.includes("n")) {
            const bottomEdge = object.y + object.h;
            object.y = Math.min(object.y + candidate.shiftY, bottomEdge - MIN_RECT_SIZE);
            object.h = bottomEdge - object.y;
          }
        }
      }

      function getSelectedRect() {
        if (selectedId == null) return null;
        return getById(selectedId);
      }

      function setWallControlEnabled(side, enabled) {
        const control = wallControls[side];
        control.dec.disabled = !enabled;
        control.inc.disabled = !enabled;
        control.row.classList.toggle("disabled", !enabled);
      }

      function updateRectPanel() {
        const selected = getSelectedRect();
        if (!selected) {
          rectPanel.style.display = "none";
          return;
        }

        rectPanel.style.display = "block";
        isWallToggle.checked = selected.isWall;
        const wallsEnabled = !selected.isWall;
        const sides = ["top", "right", "bottom", "left"];
        for (const side of sides) {
          wallControls[side].value.textContent = `${selected.wallCm[side]} cm`;
          setWallControlEnabled(side, wallsEnabled);
        }
      }

      function adjustSelectedWall(side, deltaCm) {
        const selected = getSelectedRect();
        if (!selected || selected.isWall) return;
        selected.wallCm[side] = Math.max(0, selected.wallCm[side] + deltaCm);
        updateRectPanel();
      }

      function updateToolbar() {
        const inLock = ui.tool === "lockSelect";
        const inMeasure = ui.tool === "measureScale";
        doneLockBtn.style.display = inLock ? "inline-block" : "none";
        cancelLockBtn.style.display = inLock ? "inline-block" : "none";
        scaleMetersInput.style.display = inMeasure ? "inline-block" : "none";
        setScaleBtn.style.display = inMeasure ? "inline-block" : "none";
        cancelScaleBtn.style.display = inMeasure ? "inline-block" : "none";
        lockModeBtn.disabled = inLock;
        measureModeBtn.disabled = inMeasure;

        if (ui.tool === "drawRect") {
          modeLabel.textContent = "Mode: draw rectangle (drag on canvas)";
        } else if (inLock) {
          modeLabel.textContent = `Mode: lock select (${lockDraftSet.size} selected)`;
        } else if (inMeasure) {
          if (scaleInputState.pendingLength > 0) {
            modeLabel.textContent = "Mode: set scale (enter meters, then Set scale)";
          } else {
            modeLabel.textContent = "Mode: set scale (draw a reference line)";
          }
        } else {
          modeLabel.textContent = `Mode: select (scale ${metersPerWorldUnit.toFixed(4)} m/unit)`;
        }
      }

      addRectBtn.addEventListener("click", () => {
        ui.tool = "drawRect";
        lockDraftSet.clear();
        measureDraft.active = false;
        scaleInputState.pendingLength = 0;
        updateToolbar();
      });

      lockModeBtn.addEventListener("click", () => {
        ui.tool = "lockSelect";
        lockDraftSet.clear();
        measureDraft.active = false;
        scaleInputState.pendingLength = 0;
        updateToolbar();
      });

      measureModeBtn.addEventListener("click", () => {
        ui.tool = "measureScale";
        lockDraftSet.clear();
        measureDraft.active = false;
        scaleInputState.pendingLength = 0;
        scaleMetersInput.value = "";
        updateToolbar();
      });

      doneLockBtn.addEventListener("click", () => {
        if (lockDraftSet.size >= 2) {
          const groupId = nextGroupId++;
          for (const object of objects) {
            if (lockDraftSet.has(object.id)) {
              object.groupId = groupId;
            }
          }
        }
        lockDraftSet.clear();
        ui.tool = "select";
        updateToolbar();
      });

      cancelLockBtn.addEventListener("click", () => {
        lockDraftSet.clear();
        ui.tool = "select";
        updateToolbar();
      });

      setScaleBtn.addEventListener("click", () => {
        const meters = Number(scaleMetersInput.value);
        if (!(meters > 0) || !(scaleInputState.pendingLength > 0)) {
          return;
        }
        metersPerWorldUnit = meters / scaleInputState.pendingLength;
        scaleReferenceMeters = meters;
        if (measureDraft.active) {
          scaleReferenceLine = {
            x0: measureDraft.x0,
            y0: measureDraft.y0,
            x1: measureDraft.x1,
            y1: measureDraft.y1
          };
        }
        measureDraft.active = false;
        scaleInputState.pendingLength = 0;
        ui.tool = "select";
        updateToolbar();
      });

      cancelScaleBtn.addEventListener("click", () => {
        measureDraft.active = false;
        scaleInputState.pendingLength = 0;
        ui.tool = "select";
        updateToolbar();
      });

      isWallToggle.addEventListener("change", () => {
        const selected = getSelectedRect();
        if (!selected) return;
        selected.isWall = isWallToggle.checked;
        updateRectPanel();
      });

      const wallSides = ["top", "right", "bottom", "left"];
      for (const side of wallSides) {
        wallControls[side].dec.addEventListener("click", () => adjustSelectedWall(side, -1));
        wallControls[side].inc.addEventListener("click", () => adjustSelectedWall(side, 1));
      }

      updateToolbar();
      updateRectPanel();

      canvas.addEventListener("pointerdown", (event) => {
        const worldPt = screenToWorld(event.clientX, event.clientY);
        const hit = hitTest(worldPt);
        const selectedObject = ui.tool === "select" && selectedId != null ? getById(selectedId) : null;
        const selectedHandle = selectedObject ? hitResizeHandle(worldPt, selectedObject) : null;

        if (ui.tool === "lockSelect") {
          if (event.button === 0 && hit) {
            if (lockDraftSet.has(hit.id)) {
              lockDraftSet.delete(hit.id);
            } else {
              lockDraftSet.add(hit.id);
            }
            updateToolbar();
          }
          return;
        }

        if (ui.tool === "drawRect" && event.button === 0) {
          canvas.setPointerCapture(event.pointerId);
          pointer.down = true;
          pointer.sx = event.clientX;
          pointer.sy = event.clientY;
          pointer.mode = "drawRect";
          draft.active = true;
          draft.x0 = worldPt.x;
          draft.y0 = worldPt.y;
          draft.x1 = worldPt.x;
          draft.y1 = worldPt.y;
          return;
        }

        if (ui.tool === "measureScale" && event.button === 0) {
          canvas.setPointerCapture(event.pointerId);
          pointer.down = true;
          pointer.sx = event.clientX;
          pointer.sy = event.clientY;
          pointer.mode = "measureScaleDraw";
          measureDraft.active = true;
          measureDraft.x0 = worldPt.x;
          measureDraft.y0 = worldPt.y;
          measureDraft.x1 = worldPt.x;
          measureDraft.y1 = worldPt.y;
          scaleInputState.pendingLength = 0;
          updateToolbar();
          return;
        }

        if (ui.tool === "select" && event.button === 0 && selectedObject && selectedHandle) {
          canvas.setPointerCapture(event.pointerId);
          pointer.down = true;
          pointer.sx = event.clientX;
          pointer.sy = event.clientY;
          pointer.mode = "resize";
          pointer.target = selectedObject;
          pointer.resizeHandle = selectedHandle;
          pointer.resizeStartWorldX = worldPt.x;
          pointer.resizeStartWorldY = worldPt.y;
          pointer.resizeStartRect = {
            x: selectedObject.x,
            y: selectedObject.y,
            w: selectedObject.w,
            h: selectedObject.h
          };
          pointer.snap = null;
          return;
        }

        if (ui.tool === "select" && event.button === 0 && hit && selectedId !== hit.id) {
          selectedId = hit.id;
          updateRectPanel();
          return;
        }

        if (ui.tool === "select" && event.button === 0 && hit && selectedId === hit.id) {
          const outer = getOuterRect(hit);
          canvas.setPointerCapture(event.pointerId);
          pointer.down = true;
          pointer.sx = event.clientX;
          pointer.sy = event.clientY;

          pointer.mode = "drag";
          pointer.target = hit;
          pointer.dragOffsetX = worldPt.x - outer.x;
          pointer.dragOffsetY = worldPt.y - outer.y;
          pointer.anchorStartX = outer.x;
          pointer.anchorStartY = outer.y;

          const dragMembers = getDragMembers(hit);
          const dragIds = dragMembers.map((object) => object.id);
          bringIdsToFront(dragIds);
          pointer.movingIds = new Set(dragIds);
          pointer.startPositions = new Map(
            dragMembers.map((object) => [object.id, { x: object.x, y: object.y }])
          );
          pointer.snap = null;
          return;
        }

        if (ui.tool === "select" && event.button === 0 && !hit) {
          selectedId = null;
          updateRectPanel();
        }

        canvas.setPointerCapture(event.pointerId);
        pointer.down = true;
        pointer.sx = event.clientX;
        pointer.sy = event.clientY;
        pointer.mode = "pan";
        pointer.target = null;
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!pointer.down) return;

        const worldPt = screenToWorld(event.clientX, event.clientY);

        if (pointer.mode === "drawRect" && draft.active) {
          draft.x1 = worldPt.x;
          draft.y1 = worldPt.y;
          return;
        }

        if (pointer.mode === "measureScaleDraw" && measureDraft.active) {
          measureDraft.x1 = worldPt.x;
          measureDraft.y1 = worldPt.y;
          return;
        }

        if (pointer.mode === "drag" && pointer.target) {
          applyDragAt(worldPt);
          return;
        }

        if (pointer.mode === "resize" && pointer.target) {
          applyResizeAt(worldPt);
          return;
        }

        if (pointer.mode === "pan") {
          const dxScreen = event.clientX - pointer.sx;
          const dyScreen = event.clientY - pointer.sy;
          camera.x -= dxScreen / camera.zoom;
          camera.y -= dyScreen / camera.zoom;
          pointer.sx = event.clientX;
          pointer.sy = event.clientY;
        }
      });

      canvas.addEventListener("pointerup", () => {
        if (pointer.mode === "drawRect" && draft.active) {
          const x = Math.min(draft.x0, draft.x1);
          const y = Math.min(draft.y0, draft.y1);
          const w = Math.abs(draft.x1 - draft.x0);
          const h = Math.abs(draft.y1 - draft.y0);
          if (w > 3 && h > 3) {
            const id = nextId++;
            objects.push(createRect(id, x, y, w, h));
            lastCreatedId = id;
          }
          draft.active = false;
          ui.tool = "select";
          updateToolbar();
        }

        if (pointer.mode === "measureScaleDraw" && measureDraft.active) {
          const dx = measureDraft.x1 - measureDraft.x0;
          const dy = measureDraft.y1 - measureDraft.y0;
          const length = Math.hypot(dx, dy);
          if (length >= MIN_SCALE_LINE_LENGTH) {
            scaleInputState.pendingLength = length;
            scaleMetersInput.focus();
          } else {
            measureDraft.active = false;
            scaleInputState.pendingLength = 0;
          }
          updateToolbar();
        }

        resetPointer();
      });

      canvas.addEventListener("wheel", (event) => {
        event.preventDefault();
        const worldBefore = screenToWorld(event.clientX, event.clientY);
        const zoomFactor = Math.exp(-event.deltaY * 0.001);
        camera.zoom = Math.min(6, Math.max(0.2, camera.zoom * zoomFactor));
        const worldAfter = screenToWorld(event.clientX, event.clientY);
        camera.x += worldBefore.x - worldAfter.x;
        camera.y += worldBefore.y - worldAfter.y;
      }, { passive: false });

      function drawGrid(cssW, cssH) {
        ctx.lineWidth = 1 / camera.zoom;
        ctx.strokeStyle = "#ddd";
        const grid = 50;
        const left = camera.x;
        const top = camera.y;
        const right = camera.x + cssW / camera.zoom;
        const bottom = camera.y + cssH / camera.zoom;
        const startX = Math.floor(left / grid) * grid;
        const startY = Math.floor(top / grid) * grid;

        for (let x = startX; x < right; x += grid) {
          ctx.beginPath();
          ctx.moveTo(x, top);
          ctx.lineTo(x, bottom);
          ctx.stroke();
        }

        for (let y = startY; y < bottom; y += grid) {
          ctx.beginPath();
          ctx.moveTo(left, y);
          ctx.lineTo(right, y);
          ctx.stroke();
        }
      }

      function drawBackground() {
        if (!background.loaded) return;
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.drawImage(background.image, background.x, background.y, background.w, background.h);
        ctx.restore();
      }

      function formatDimension(valueInWorldUnits) {
        const meters = worldToCm(valueInWorldUnits) / CM_PER_METER;
        return `${meters.toFixed(2)} m`;
      }

      function drawDimensionText(text, x, y) {
        const fontSize = 12 / camera.zoom;
        ctx.font = `${fontSize}px sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const metrics = ctx.measureText(text);
        const paddingX = 5 / camera.zoom;
        const paddingY = 3 / camera.zoom;
        const boxW = metrics.width + paddingX * 2;
        const boxH = fontSize + paddingY * 2;

        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.strokeStyle = "rgba(0,0,0,0.28)";
        ctx.lineWidth = 1 / camera.zoom;
        ctx.fillRect(x - boxW / 2, y - boxH / 2, boxW, boxH);
        ctx.strokeRect(x - boxW / 2, y - boxH / 2, boxW, boxH);

        ctx.fillStyle = "#111";
        ctx.fillText(text, x, y);
      }

      function drawRectDimensions(rect) {
        const widthText = formatDimension(rect.w);
        const heightText = formatDimension(rect.h);
        const inset = 12 / camera.zoom;
        drawDimensionText(widthText, rect.x + rect.w / 2, rect.y + inset);
        drawDimensionText(heightText, rect.x + inset, rect.y + rect.h / 2);
      }

      function drawDimensionOverlays() {
        const targets = new Set();
        if (lastCreatedId != null) targets.add(lastCreatedId);
        if (selectedId != null) targets.add(selectedId);
        for (const id of targets) {
          const rect = getById(id);
          if (!rect) continue;
          drawRectDimensions(rect);
        }
      }

      function groupColor(groupId) {
        if (groupId == null) return "rgba(0,0,0,0.18)";
        const seed = groupId * 57;
        const hue = seed % 360;
        return `hsla(${hue}, 70%, 55%, 0.32)`;
      }

      function drawObjects() {
        for (const object of objects) {
          const outer = getOuterRect(object);
          if (object.isWall) {
            ctx.fillStyle = "rgba(20,20,20,0.68)";
            ctx.strokeStyle = "#111";
            ctx.lineWidth = 2 / camera.zoom;
            ctx.fillRect(outer.x, outer.y, outer.w, outer.h);
            ctx.strokeRect(outer.x, outer.y, outer.w, outer.h);
          } else {
            const wall = getWallWorld(object);
            ctx.fillStyle = "rgba(55,55,55,0.4)";
            if (wall.top > 0) ctx.fillRect(outer.x, outer.y, outer.w, wall.top);
            if (wall.right > 0) ctx.fillRect(object.x + object.w, outer.y, wall.right, outer.h);
            if (wall.bottom > 0) ctx.fillRect(outer.x, object.y + object.h, outer.w, wall.bottom);
            if (wall.left > 0) ctx.fillRect(outer.x, outer.y, wall.left, outer.h);

            ctx.fillStyle = groupColor(object.groupId);
            ctx.strokeStyle = object.groupId == null ? "#222" : "#0a4";
            ctx.lineWidth = object.groupId == null ? 1 / camera.zoom : 2 / camera.zoom;
            ctx.fillRect(object.x, object.y, object.w, object.h);
            ctx.strokeRect(object.x, object.y, object.w, object.h);

            ctx.strokeStyle = "rgba(0,0,0,0.45)";
            ctx.lineWidth = 1.2 / camera.zoom;
            ctx.strokeRect(outer.x, outer.y, outer.w, outer.h);
          }

          if (ui.tool === "lockSelect" && lockDraftSet.has(object.id)) {
            ctx.strokeStyle = "#06f";
            ctx.lineWidth = 3 / camera.zoom;
            ctx.strokeRect(outer.x, outer.y, outer.w, outer.h);
          }

          if (ui.tool === "select" && selectedId === object.id) {
            ctx.strokeStyle = "#06f";
            ctx.lineWidth = 2 / camera.zoom;
            ctx.strokeRect(outer.x, outer.y, outer.w, outer.h);
          }
        }
      }

      function drawResizeHandles() {
        if (ui.tool !== "select" || selectedId == null) return;
        const object = getById(selectedId);
        if (!object) return;

        const handles = getResizeHandles(object);
        ctx.fillStyle = "#fff";
        ctx.strokeStyle = "#06f";
        ctx.lineWidth = 1.5 / camera.zoom;
        for (const handle of handles) {
          ctx.fillRect(handle.x, handle.y, handle.w, handle.h);
          ctx.strokeRect(handle.x, handle.y, handle.w, handle.h);
        }
      }

      function drawDraftRect() {
        if (!draft.active) return;
        const x = Math.min(draft.x0, draft.x1);
        const y = Math.min(draft.y0, draft.y1);
        const w = Math.abs(draft.x1 - draft.x0);
        const h = Math.abs(draft.y1 - draft.y0);
        ctx.strokeStyle = "#06f";
        ctx.lineWidth = 2 / camera.zoom;
        ctx.strokeRect(x, y, w, h);
      }

      function drawSnapGuides() {
        if (!((pointer.mode === "drag" || pointer.mode === "resize") && pointer.snap)) return;

        ctx.strokeStyle = "#f04";
        ctx.lineWidth = 1.5 / camera.zoom;
        ctx.setLineDash([8 / camera.zoom, 6 / camera.zoom]);

        const viewLeft = camera.x;
        const viewTop = camera.y;
        const viewRight = camera.x + window.innerWidth / camera.zoom;
        const viewBottom = camera.y + window.innerHeight / camera.zoom;

        if (pointer.snap.lineX != null) {
          ctx.beginPath();
          ctx.moveTo(pointer.snap.lineX, viewTop);
          ctx.lineTo(pointer.snap.lineX, viewBottom);
          ctx.stroke();
        }

        if (pointer.snap.lineY != null) {
          ctx.beginPath();
          ctx.moveTo(viewLeft, pointer.snap.lineY);
          ctx.lineTo(viewRight, pointer.snap.lineY);
          ctx.stroke();
        }

        ctx.setLineDash([]);
      }

      function drawScaleLine(line, color) {
        if (!line) return;
        ctx.strokeStyle = color;
        ctx.lineWidth = 2 / camera.zoom;
        ctx.setLineDash([10 / camera.zoom, 7 / camera.zoom]);
        ctx.beginPath();
        ctx.moveTo(line.x0, line.y0);
        ctx.lineTo(line.x1, line.y1);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      function drawScaleOverlay() {
        if (scaleReferenceLine) {
          drawScaleLine(scaleReferenceLine, "#0aa");
          if (scaleReferenceMeters != null) {
            const labelX = (scaleReferenceLine.x0 + scaleReferenceLine.x1) / 2;
            const labelY = (scaleReferenceLine.y0 + scaleReferenceLine.y1) / 2;
            ctx.fillStyle = "#055";
            ctx.font = `${12 / camera.zoom}px sans-serif`;
            ctx.fillText(`${scaleReferenceMeters} m`, labelX + 6 / camera.zoom, labelY - 6 / camera.zoom);
          }
        }
        if (measureDraft.active) {
          drawScaleLine(measureDraft, "#f80");
        }
      }

      function draw() {
        const cssW = window.innerWidth;
        const cssH = window.innerHeight;
        ctx.clearRect(0, 0, cssW, cssH);

        const dpr = window.devicePixelRatio || 1;
        ctx.save();
        ctx.setTransform(
          dpr * camera.zoom, 0,
          0, dpr * camera.zoom,
          -(camera.x * camera.zoom) * dpr,
          -(camera.y * camera.zoom) * dpr
        );

        drawGrid(cssW, cssH);
        drawBackground();
        drawObjects();
        drawDimensionOverlays();
        drawResizeHandles();
        drawScaleOverlay();
        drawDraftRect();
        drawSnapGuides();

        ctx.restore();
        requestAnimationFrame(draw);
      }

      requestAnimationFrame(draw);
    </script>
  </body>
</html>
